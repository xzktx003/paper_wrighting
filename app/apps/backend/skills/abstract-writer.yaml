name: abstract-writer
display_name: "摘要撰写优化"
description: "帮助撰写简洁有力的论文摘要"
type: writing
trigger: manual

prompt: |
  帮助撰写高质量的Abstract（150-250词）：
  1. 第一句：研究背景和问题的重要性
  2. 第二句：现有方法的不足
  3. 第三句：本文提出的方法概述
  4. 第四句：方法的关键创新点
  5. 最后1-2句：主要实验结果和结论
  确保：
  - 不使用缩写（除非极其常见）
  - 不引用参考文献
  - 包含关键数值结果
  - 每句话都传递新信息

parameters: []
