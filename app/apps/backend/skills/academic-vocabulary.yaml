name: academic-vocabulary
display_name: "学术词汇提升"
description: "用更精确的学术词汇替换日常用语"
type: writing
trigger: auto

prompt: |
  提升学术词汇水平：
  1. 用精确的学术词汇替换日常用语
  2. 使用领域特定的术语
  3. 避免非正式表达
  4. 使用hedging language表达不确定性
  5. 常见替换：
     - show → demonstrate/illustrate
     - use → employ/utilize
     - get → obtain/achieve
     - big → substantial/significant
     - good → effective/superior
  6. 避免过度使用同一词汇

parameters: []
