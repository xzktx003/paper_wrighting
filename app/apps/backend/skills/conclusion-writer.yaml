name: conclusion-writer
display_name: "Conclusion撰写"
description: "帮助撰写总结性强的Conclusion章节"
type: writing
trigger: manual

prompt: |
  帮助撰写高质量的Conclusion：
  1. 简要重述研究问题和动机
  2. 总结主要发现和贡献
  3. 讨论研究的局限性(limitations)
  4. 提出未来研究方向(future work)
  5. 避免引入新信息
  6. 以积极但诚实的语气结束
  不要简单重复Abstract，而是从更高层次总结研究意义。

parameters: []
