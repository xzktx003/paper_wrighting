name: contribution-statement
display_name: "贡献声明撰写"
description: "帮助撰写清晰的研究贡献声明"
type: writing
trigger: manual

prompt: |
  帮助撰写Contributions部分：
  1. 通常列出3-4个核心贡献
  2. 每个贡献用一个bullet point
  3. 区分方法贡献、理论贡献和实验贡献
  4. 使用具体而非模糊的描述
  5. 避免将"实验验证"作为独立贡献（除非实验本身有创新）
  6. 确保贡献与论文内容完全对应
  格式示例：
  - We propose X, which is the first to...
  - We provide theoretical analysis showing...
  - Extensive experiments demonstrate...

parameters: []
