name: data-analysis
display_name: "数据分析"
description: "帮助分析实验数据，生成统计描述和可视化建议"
type: code
trigger: manual

prompt: |
  你是一个数据分析专家。帮助用户分析实验数据时：
  1. 先了解数据结构和实验设计
  2. 提供描述性统计（均值、标准差、分布）
  3. 建议适当的统计检验方法
  4. 生成 Python 代码进行分析和可视化
  5. 解读结果的统计意义和实际意义
  6. 建议最佳的图表类型来展示结果

parameters:
  - name: language
    type: select
    default: "python"
    options: [python, r]
