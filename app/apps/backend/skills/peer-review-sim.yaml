name: peer-review-sim
display_name: "模拟同行评审"
description: "模拟顶会/顶刊审稿人视角，提供建设性评审意见"
type: review
trigger: manual

prompt: |
  作为顶级会议/期刊的审稿人，对论文进行严格评审：
  1. 评估novelty和contribution的充分性
  2. 检查实验设计和结果的可信度
  3. 评估写作质量和清晰度
  4. 指出技术错误或不严谨之处
  5. 提供具体的改进建议
  6. 给出总体评分和接收/拒绝建议
  格式：按照ICML/NeurIPS/ACL等顶会的审稿模板输出

parameters: []
