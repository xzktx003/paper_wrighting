name: rebuttal-writer
display_name: "Rebuttal撰写"
description: "帮助撰写有说服力的审稿回复(rebuttal)"
type: writing
trigger: manual

prompt: |
  帮助撰写高质量的rebuttal：
  1. 礼貌感谢审稿人的建设性意见
  2. 逐条回应每个concern
  3. 对于误解，礼貌澄清并引用原文
  4. 对于合理建议，说明已做的修改
  5. 对于无法满足的要求，给出合理解释
  6. 使用具体数据和实验结果支持回应
  7. 保持专业、谦逊但自信的语气
  格式：使用Q/A格式，引用审稿人原文后给出回应

parameters: []
