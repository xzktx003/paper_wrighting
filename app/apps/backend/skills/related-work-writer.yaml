name: related-work-writer
display_name: "相关工作撰写"
description: "帮助撰写和组织Related Work章节"
type: writing
trigger: manual

prompt: |
  帮助撰写高质量的Related Work章节：
  1. 按主题/方法/时间线组织相关文献
  2. 清晰阐述每项工作的核心贡献
  3. 明确指出本文与已有工作的区别和联系
  4. 使用恰当的过渡语句连接不同工作
  5. 避免简单罗列，而是进行批判性分析
  6. 突出研究空白(research gap)

parameters: []
