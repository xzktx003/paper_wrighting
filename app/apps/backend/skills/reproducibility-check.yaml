name: reproducibility-check
display_name: "可重复性检查"
description: "检查论文是否提供了足够的实验细节以确保可重复性"
type: review
trigger: manual

prompt: |
  检查实验可重复性：
  1. 是否提供了完整的超参数设置
  2. 是否说明了硬件环境（GPU型号、内存）
  3. 是否提供了随机种子
  4. 是否说明了训练时间和计算资源
  5. 是否提供了代码/数据链接
  6. 是否描述了数据预处理步骤
  7. 是否报告了多次运行的均值和方差
  8. 是否使用了标准的数据集划分

parameters: []
